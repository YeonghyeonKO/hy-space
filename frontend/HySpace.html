<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>HySpace · 좌석/회의실 예약</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --bg: #F4F6FA;
    --surface: #FFFFFF;
    --surface-2: #FAFBFD;
    --line: #E5E8EE;
    --line-strong: #D4D9E1;
    --text: #0F1419;
    --text-2: #4F5663;
    --text-3: #8B92A0;
    --primary: #2A5BD7;
    --primary-soft: #E8EFFD;
    --primary-text: #1E47B0;
    --ok: #1F8A5B;
    --ok-soft: #E1F2EA;
    --warn: #C28028;
    --warn-soft: #FBF1DD;
    --danger: #C44848;
    --danger-soft: #FAE6E6;
    --my: #2A5BD7;
    --my-soft: #DBE5F8;
    --radius-sm: 6px;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --shadow-sm: 0 1px 2px rgba(15, 20, 25, .04), 0 0 0 1px rgba(15, 20, 25, .04);
    --shadow: 0 4px 14px rgba(15, 20, 25, .06), 0 0 0 1px rgba(15, 20, 25, .05);
    --shadow-lg: 0 12px 30px rgba(15, 20, 25, .12), 0 0 0 1px rgba(15, 20, 25, .06);
    --header-h: 56px;
    --sub-h: 52px;
    --sidebar-w: 220px;
  }
  body[data-tone="sand"] {
    --bg: #F7F4ED; --surface: #FFFEFB; --surface-2: #FBF8F0;
    --line: #E9E2D2; --line-strong: #D6CDB8; --text: #2A2418;
    --text-2: #5A5240; --text-3: #8C8470; --primary: #B8825C;
    --primary-soft: #F4EADC; --primary-text: #8E5E3A;
    --my: #B8825C; --my-soft: #F0E2D0;
  }
  body[data-tone="mono"] {
    --bg: #F5F5F5; --surface: #FFFFFF; --surface-2: #FAFAFA;
    --line: #E0E0E0; --line-strong: #C8C8C8; --text: #111111;
    --text-2: #4A4A4A; --text-3: #8A8A8A; --primary: #111111;
    --primary-soft: #ECECEC; --primary-text: #111111;
    --my: #111111; --my-soft: #DEDEDE;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans); font-size: 14px; line-height: 1.45;
    color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased; font-feature-settings: 'tnum' on;
  }
  #root { min-height: 100%; }
  button { font-family: inherit; }
  ::selection { background: var(--primary-soft); color: var(--primary-text); }

  .app { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar-w) 1fr; }
  .app[data-layout="topbar"] { grid-template-columns: 1fr; }

  .sidebar {
    background: var(--surface); border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; z-index: 10;
  }
  .app[data-layout="topbar"] .sidebar { display: none; }
  .sb-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 18px 16px; border-bottom: 1px solid var(--line); color: var(--primary);
  }
  .sb-brand-name { font-weight: 700; letter-spacing: -.01em; font-size: 16px; color: var(--text); }
  .sb-brand-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; letter-spacing: .02em; }
  .sb-nav { padding: 10px 8px; display: flex; flex-direction: column; gap: 1px; flex: 1; }
  .sb-section { font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-3); padding: 14px 12px 6px; font-weight: 600; }
  .sb-link {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: var(--radius);
    color: var(--text-2); cursor: pointer; user-select: none; font-weight: 500;
    border: 0; background: transparent; width: 100%; text-align: left; font-size: 13.5px;
  }
  .sb-link:hover { background: var(--surface-2); color: var(--text); }
  .sb-link[data-on="1"] { background: var(--primary-soft); color: var(--primary-text); font-weight: 600; }
  .sb-link[data-on="1"] svg { color: var(--primary); }
  .sb-link svg { color: var(--text-3); flex: 0 0 auto; }
  .sb-link .badge { margin-left: auto; font-size: 11px; background: var(--bg); color: var(--text-2);
    padding: 1px 7px; border-radius: 999px; font-variant-numeric: tabular-nums; }
  .sb-link[data-on="1"] .badge { background: rgba(255,255,255,.6); color: var(--primary-text); }
  .sb-user {
    border-top: 1px solid var(--line); padding: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: grid; place-items: center; font-size: 12px; font-weight: 600; flex: 0 0 auto;
  }
  .sb-user-info { min-width: 0; }
  .sb-user-name { font-weight: 600; font-size: 13px; }
  .sb-user-aff { font-size: 11.5px; color: var(--text-3); }

  .main { display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    height: var(--header-h); border-bottom: 1px solid var(--line);
    background: var(--surface); display: flex; align-items: center;
    padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 9;
  }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -.005em; }
  .topbar-grow { flex: 1; }
  .topbar-icon-btn { width: 34px; height: 34px; border-radius: var(--radius);
    background: transparent; border: 0; color: var(--text-2);
    display: grid; place-items: center; cursor: pointer; }
  .topbar-icon-btn:hover { background: var(--surface-2); color: var(--text); }

  .subbar {
    height: var(--sub-h); border-bottom: 1px solid var(--line);
    background: var(--surface); display: flex; align-items: center;
    padding: 0 24px; gap: 8px; position: sticky; top: var(--header-h); z-index: 8;
  }
  .crumbs { display: flex; align-items: center; gap: 6px; }
  .crumb {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 10px; background: transparent; border: 1px solid transparent;
    border-radius: var(--radius); font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer;
  }
  .crumb:hover { background: var(--surface-2); border-color: var(--line); }
  .crumb-label { color: var(--text-3); margin-right: 4px; font-weight: 500; }
  .crumb-sep { color: var(--text-3); padding: 0 2px; }
  .crumb svg { color: var(--text-3); }

  .pill { display: inline-flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 10px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    background: var(--surface-2); border: 1px solid var(--line); color: var(--text-2); }
  .pill[data-color="primary"] { background: var(--primary-soft); color: var(--primary-text); border-color: transparent; }
  .pill[data-color="ax"] { background: #F0EBFB; color: #5C3DB8; border-color: transparent; }
  .pill[data-color="ok"] { background: var(--ok-soft); color: var(--ok); border-color: transparent; }
  .pill[data-color="muted"] { background: var(--bg); color: var(--text-3); }

  .btn {
    height: 32px; padding: 0 14px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--surface);
    color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--surface-2); }
  .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-text); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 12.5px; }
  .btn-lg { height: 38px; padding: 0 16px; font-size: 14px; }

  .content { flex: 1; padding: 20px 24px 32px; min-width: 0; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); }
  .card-pad { padding: 16px; }

  .menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-lg);
    min-width: 220px; padding: 4px; z-index: 100; max-height: 360px; overflow: auto;
  }
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
  }
  .menu-item:hover { background: var(--surface-2); }
  .menu-item[data-on="1"] { background: var(--primary-soft); color: var(--primary-text); }
  .menu-item-meta { margin-left: auto; font-size: 11.5px; color: var(--text-3); }
  .menu-item-locked { opacity: .6; }
  .menu-sect { font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-3); padding: 8px 10px 4px; font-weight: 600; }
  .menu-divider { height: 1px; background: var(--line); margin: 4px -4px; }
  .anchor { position: relative; }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .topbar { padding: 0 16px; gap: 6px; }
    .subbar { padding: 0 12px; height: auto; min-height: var(--sub-h); flex-wrap: wrap; padding-top: 8px; padding-bottom: 8px; gap: 4px; }
    .content { padding: 16px 14px 24px; }
    .crumb { padding: 6px 8px; font-size: 12.5px; }
    .crumb-label { display: none; }
    .topbar-title { font-size: 14px; }
    .mobile-hide { display: none !important; }
    .mobile-tabs { display: flex !important; }
  }

  .mobile-tabs { display: none; position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface); border-top: 1px solid var(--line); height: 60px;
    z-index: 50; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); }
  .mobile-tabs button {
    flex: 1; background: transparent; border: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; color: var(--text-3); font-size: 10.5px; font-weight: 500;
  }
  .mobile-tabs button[data-on="1"] { color: var(--primary); }

  @keyframes fadein { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
  .fadein { animation: fadein .18s ease both; }
  @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pop { animation: pop .18s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes slide-r { from { transform: translateX(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .slide-r { animation: slide-r .22s cubic-bezier(.2,.7,.3,1) both; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(15, 20, 25, .35);
    display: grid; place-items: center; z-index: 200;
    animation: fadein .15s ease; padding: 20px;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-xl);
    width: 100%; max-width: 460px; box-shadow: var(--shadow-lg);
    overflow: hidden; animation: pop .18s cubic-bezier(.2,.7,.3,1);
  }
  .modal-hd { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; }
  .modal-title { font-size: 16px; font-weight: 600; letter-spacing: -.005em; }
  .modal-body { padding: 4px 20px 16px; }
  .modal-foot { padding: 12px 20px; border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: flex-end; background: var(--surface-2); }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; color: var(--text-2); font-weight: 500; }
  .input, .select {
    height: 34px; padding: 0 12px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--surface);
    font: inherit; font-size: 13px; color: var(--text); width: 100%;
  }
  .input:focus, .select:focus { outline: 2px solid var(--primary-soft); border-color: var(--primary); }

  .row { display: flex; align-items: center; gap: 8px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .grow { flex: 1; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .muted { color: var(--text-3); }
  .text-2 { color: var(--text-2); }
  .small { font-size: 12px; }
  .smaller { font-size: 11.5px; }
  .nowrap { white-space: nowrap; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h2 { font-size: 18px; font-weight: 600; letter-spacing: -.01em; margin: 0; }
  .h3 { font-size: 14px; font-weight: 600; margin: 0; }

  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 16px;
    border-radius: 999px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg); z-index: 300;
    display: flex; align-items: center; gap: 8px; animation: pop .18s ease;
  }
</style>
</head>
<body data-tone="cool">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="api.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="seat-booking.jsx"></script>
<script type="text/babel" src="room-booking.jsx"></script>
<script type="text/babel" src="my-reservations.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
