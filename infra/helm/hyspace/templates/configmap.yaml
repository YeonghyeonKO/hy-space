apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hyspace.fullname" . }}-config
  labels:
    {{- include "hyspace.labels" . | nindent 4 }}
data:
  DEV_MODE: {{ .Values.app.devMode | quote }}
  CORS_ORIGINS: {{ .Values.app.corsOrigins | default (printf "https://%s" (include "hyspace.host" .)) | quote }}
  {{- if .Values.keycloak.enabled }}
  KEYCLOAK_URL: {{ .Values.keycloak.serverUrl | quote }}
  KEYCLOAK_REALM: {{ .Values.keycloak.realm | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.keycloak.clientId | quote }}
  KEYCLOAK_EMPLOYEE_CLAIM: {{ .Values.keycloak.employeeClaim | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hyspace.fullname" . }}-nginx
  labels:
    {{- include "hyspace.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index HySpace.html;

        location / {
            try_files $uri $uri/ /HySpace.html;
        }

        location /api/ {
            proxy_pass http://{{ include "hyspace.fullname" . }}-backend:{{ .Values.backend.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10m;
        }

        location /health {
            proxy_pass http://{{ include "hyspace.fullname" . }}-backend:{{ .Values.backend.port }}/health;
        }
    }
