{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hyspace.fullname" . }}
  labels:
    {{- include "hyspace.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  tls:
    - hosts:
        - {{ include "hyspace.host" . }}
  rules:
    - host: {{ include "hyspace.host" . }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "hyspace.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "hyspace.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
